services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentic}
    # Publica na 5434 do host (5432 e 5433 já são usadas pelos clusters
    # PostgreSQL 12 e 14 do host). Acesse via HeidiSQL por <ip-da-vm>:5434.
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # As migrations são aplicadas automaticamente na primeira inicialização
      - ./src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: albrom/agentic-tabular-pipeline:latest
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/agentic}
      ARTIFACT_DIR: ${ARTIFACT_DIR:-artifacts/}
      # Painel de administração em /admin (login simples por variáveis de ambiente)
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-troque-este-segredo}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

  ui:
    image: albrom/agentic-tabular-pipeline:latest
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_URL: ${API_URL:-http://api:8000}
      # URL pública da API para links abertos no navegador (ex.: painel /admin)
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/agentic}
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - api

volumes:
  pgdata:
